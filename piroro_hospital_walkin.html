<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4a90e2">
<title>ピロロ病院 直接受付</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    background: linear-gradient(135deg, #f5a623 0%, #f08061 100%);
    color: #2c3e50;
    min-height: 100vh;
  }
  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    color: #fff;
    text-align: center;
    padding: 16px 0 24px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 17px;
    opacity: 0.95;
  }
  .main-card {
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    flex: 1;
  }

  /* ステップ共通 */
  .step { display: none; }
  .step.active { display: block; }
  .step h2 {
    font-size: 22px;
    color: #2c3e50;
    margin-bottom: 20px;
    text-align: center;
  }

  /* 診療科選択 */
  .dept-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }
  .dept-btn {
    padding: 22px 14px;
    border: 2px solid #e8eef4;
    border-radius: 14px;
    background: #fff;
    color: #2c3e50;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .dept-btn .emoji { display: block; font-size: 36px; margin-bottom: 6px; }
  .dept-btn:active, .dept-btn.selected {
    border-color: #f5a623;
    background: #fff5e6;
  }

  /* フォーム */
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 6px;
  }
  .form-group .req {
    color: #e74c3c;
    font-size: 11px;
    margin-left: 6px;
    background: #fde8e6;
    padding: 2px 8px;
    border-radius: 8px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 14px 16px;
    font-size: 17px;
    border: 2px solid #d5dfe8;
    border-radius: 12px;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: #f5a623;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .dept-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* フッター */
  .footer-btns {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 16px 20px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn.primary { background: #f5a623; color: #fff; }
  .btn.secondary { background: #e8eef4; color: #5a6b7a; }
  .btn.success { background: #3fc28a; color: #fff; }
  .btn:active { transform: scale(0.98); }

  /* 完了画面 */
  .done-screen { text-align: center; padding: 10px 0; }
  .done-icon {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: #3fc28a;
    color: #fff;
    font-size: 60px;
    line-height: 100px;
    margin: 0 auto 16px;
  }
  .ticket-wrap {
    border: 2px dashed #b6c4d1;
    border-radius: 16px;
    padding: 20px;
    margin: 20px auto;
    max-width: 420px;
    background: #fafbfc;
  }
  .ticket-hospital { font-size: 14px; color: #6b7b8c; }
  .ticket-title {
    font-size: 20px;
    font-weight: 700;
    margin: 6px 0 14px;
  }
  .ticket-number {
    font-size: 14px;
    color: #6b7b8c;
    margin-bottom: 4px;
  }
  .ticket-number strong {
    display: block;
    font-size: 26px;
    color: #2c3e50;
    font-family: ui-monospace, monospace;
    letter-spacing: 1px;
  }
  .ticket-waiting {
    margin: 20px 0 16px;
    font-size: 14px;
    color: #6b7b8c;
  }
  .ticket-waiting strong {
    display: block;
    font-size: 72px;
    color: #f5a623;
    font-weight: 800;
    line-height: 1;
    margin-top: 4px;
  }
  #walkinQr { display: flex; justify-content: center; margin: 14px 0; }
  .ticket-detail {
    font-size: 13px;
    color: #5a6b7a;
    text-align: left;
    padding: 10px;
    border-top: 1px dashed #d5dfe8;
    margin-top: 14px;
    line-height: 1.6;
  }
  .ticket-notice {
    font-size: 12px;
    color: #6b7b8c;
    text-align: center;
    margin-top: 12px;
    line-height: 1.5;
  }

  /* 印刷用（レシートプリンター想定: 80mm幅） */
  @media print {
    body { background: #fff !important; }
    .header, .footer-btns, .no-print { display: none !important; }
    .main-card { box-shadow: none !important; padding: 0 !important; border-radius: 0 !important; }
    .app { max-width: 80mm !important; padding: 0 !important; }
    .ticket-wrap {
      border: none !important;
      background: #fff !important;
      padding: 8mm 4mm !important;
      max-width: 100% !important;
    }
    .done-icon { display: none !important; }
    .ticket-waiting strong { color: #000 !important; }
    .step h2 { display: none !important; }
  }

  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #2c3e50;
    color: #fff;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 15px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 9999;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header no-print">
    <h1>🏥 ピロロ病院 直接受付</h1>
    <p>予約なしでご来院の方はこちらで受付ください</p>
  </div>

  <div class="main-card">

    <!-- Step 1: 診療科 -->
    <div class="step active" id="step-dept">
      <h2>診療科をお選びください</h2>
      <div class="dept-grid" id="deptGrid"></div>
      <div class="form-group">
        <label>来院形態</label>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <label style="padding:16px; border:2px solid #d5dfe8; border-radius:12px; text-align:center; cursor:pointer;">
            <input type="radio" name="visit" value="初診" checked> 初診
          </label>
          <label style="padding:16px; border:2px solid #d5dfe8; border-radius:12px; text-align:center; cursor:pointer;">
            <input type="radio" name="visit" value="再診"> 再診
          </label>
        </div>
      </div>
      <div class="footer-btns">
        <button class="btn primary" onclick="toStep2()">次へ進む</button>
      </div>
    </div>

    <!-- Step 2: 患者情報 -->
    <div class="step" id="step-info">
      <h2>お客様情報をご入力ください</h2>
      <div class="form-group">
        <label>お名前<span class="req">必須</span></label>
        <input type="text" id="name" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label>フリガナ<span class="req">必須</span></label>
        <input type="text" id="kana" placeholder="ヤマダ タロウ">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>生年月日<span class="req">必須</span></label>
          <input type="date" id="dob">
        </div>
        <div class="form-group">
          <label>電話番号<span class="req">必須</span></label>
          <input type="tel" id="tel" placeholder="090-1234-5678" inputmode="tel">
        </div>
      </div>
      <div class="form-group">
        <label>メールアドレス <span style="color:#9ab0c4; font-size:11px;">（任意）</span></label>
        <input type="email" id="email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>症状・ご要望<span style="color:#9ab0c4; font-size:11px; margin-left:6px;">（任意）</span></label>
        <textarea id="symptom" rows="3" placeholder="例：頭痛が続いている"></textarea>
      </div>
      <div class="footer-btns">
        <button class="btn secondary" onclick="showStep('dept')">戻る</button>
        <button class="btn primary" onclick="submitWalkin()">受付する</button>
      </div>
    </div>

    <!-- Step 3: 完了（整理券） -->
    <div class="step" id="step-done">
      <div class="done-screen">
        <div class="done-icon no-print">✓</div>
        <h2 class="no-print">受付が完了しました</h2>

        <div class="ticket-wrap" id="printArea">
          <div class="ticket-hospital">🏥 ピロロ病院</div>
          <div class="ticket-title">受付整理券</div>

          <div class="ticket-number">
            整理番号
            <strong id="doneNo">-</strong>
          </div>

          <div class="ticket-waiting">
            待ち番号
            <strong id="doneWaiting">-</strong>
          </div>

          <div id="walkinQr"></div>

          <div class="ticket-detail">
            <div>氏名: <span id="doneName">-</span> 様</div>
            <div>診療科: <span id="doneDept">-</span></div>
            <div>受付時刻: <span id="doneTime">-</span></div>
          </div>

          <div class="ticket-notice">
            診察までお待ちください。<br>
            お名前または番号でお呼びします。
          </div>
        </div>

        <div class="footer-btns no-print">
          <button class="btn success" onclick="window.print()">🖨 整理券を印刷</button>
          <button class="btn secondary" onclick="resetAll()">次の方を受付</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase 初期化 -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const cfg = window.PIRORO_CONFIG && window.PIRORO_CONFIG.firebase;
if (!cfg || !cfg.apiKey || cfg.apiKey.indexOf("ここに") === 0) {
  alert("Firebase 設定が未入力です。config.js を編集してください。");
} else {
  try {
    const app = initializeApp(cfg);
    const db  = getFirestore(app);
    const col = collection(db, "reservations");

    let _cache = [];
    let _ready = false;
    const _pending = [];

    onSnapshot(col, (snap) => {
      _cache = snap.docs.map(d => d.data());
      if (!_ready) {
        _ready = true;
        _pending.splice(0).forEach(cb => cb());
      }
    }, (err) => console.error("[walkin] Firestore snapshot error:", err));

    window.FB = {
      ready: (cb) => { if (_ready) cb(); else _pending.push(cb); },
      list:  () => _cache.slice(),
      saveNew: async (r) => { await setDoc(doc(col, r.id), r); }
    };
  } catch(e) {
    console.error("[walkin] Firebase init failed:", e);
    alert("Firebase 初期化エラー: " + e.message);
  }
}
</script>

<script>
// ==================== 定数 ====================
const DEPTS = [
  { id: 'internal',  name: '内科',     emoji: '🩺' },
  { id: 'pediatric', name: '小児科',   emoji: '👶' },
  { id: 'surgery',   name: '外科',     emoji: '🩹' },
  { id: 'ortho',     name: '整形外科', emoji: '🦴' },
  { id: 'derma',     name: '皮膚科',   emoji: '🖐' },
  { id: 'ent',       name: '耳鼻咽喉科', emoji: '👂' },
  { id: 'ophth',     name: '眼科',     emoji: '👁' }
];

const state = {
  dept: null,
  visit: '初診'
};

// ==================== ユーティリティ ====================
const $ = (id) => document.getElementById(id);
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._tid);
  toast._tid = setTimeout(() => t.classList.remove('show'), 2200);
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ==================== 画面遷移 ====================
function showStep(name) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  $('step-' + name).classList.add('active');
}

// ==================== Step1: 診療科 ====================
function renderDepts() {
  const grid = $('deptGrid');
  grid.innerHTML = DEPTS.map(d => `
    <button class="dept-btn" data-id="${d.id}" onclick="selectDept('${d.id}')">
      <span class="emoji">${d.emoji}</span>${d.name}
    </button>
  `).join('');
  // 最初の診療科をデフォルト選択
  selectDept(DEPTS[0].id);
}

function selectDept(id) {
  state.dept = DEPTS.find(d => d.id === id);
  document.querySelectorAll('.dept-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.id === id);
  });
}

function toStep2() {
  if (!state.dept) { toast('診療科をお選びください'); return; }
  state.visit = document.querySelector('input[name="visit"]:checked').value;
  showStep('info');
}

// ==================== Step2: 受付処理 ====================
async function submitWalkin() {
  const name = $('name').value.trim();
  const kana = $('kana').value.trim();
  const dob  = $('dob').value.trim();
  const tel  = $('tel').value.trim();
  const email = $('email').value.trim();
  const symptom = $('symptom').value.trim();

  if (!name || !kana || !dob || !tel) {
    toast('必須項目を入力してください');
    return;
  }
  if (!/^[0-9\-+\s()]{8,}$/.test(tel)) {
    toast('電話番号の形式が正しくありません');
    return;
  }
  if (!window.FB) { toast('システム初期化中です。少しお待ちください'); return; }

  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const id = `WK-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*9000)+1000)}`;

  const reservation = {
    id,
    createdAt: now.toISOString(),
    checkedInAt: now.toISOString(),
    deptId: state.dept.id,
    deptName: state.dept.name,
    doctorId: 'any',
    doctorName: '指定なし',
    date: dateStr,
    time: timeStr,
    visit: state.visit,
    name, kana, dob, tel, email, symptom,
    walkin: true,
    status: 'checked_in'
  };

  try {
    await window.FB.saveNew(reservation);
    await new Promise(res => setTimeout(res, 400)); // snapshot反映待ち

    // 待ち番号算出
    const today = dateStr;
    const list = window.FB.list()
      .filter(r => r.date === today)
      .filter(r => ['checked_in','called','in_consultation'].includes(r.status))
      .sort((a,b) => (a.checkedInAt || '').localeCompare(b.checkedInAt || ''));
    const idx = list.findIndex(r => r.id === id);
    const waitingNo = idx >= 0 ? (idx + 1) : list.length + 1;

    // チケット内容セット
    $('doneNo').textContent = id;
    $('doneWaiting').textContent = waitingNo + '番';
    $('doneName').textContent = name;
    $('doneDept').textContent = state.dept.name;
    $('doneTime').textContent = timeStr;

    // QRコード生成
    const qrEl = $('walkinQr');
    qrEl.innerHTML = '';
    new QRCode(qrEl, { text: id, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M });

    showStep('done');
  } catch(e) {
    console.error(e);
    toast('受付処理に失敗しました: ' + (e.message || ''));
  }
}

// ==================== リセット ====================
function resetAll() {
  ['name','kana','dob','tel','email','symptom'].forEach(id => $(id).value = '');
  selectDept(DEPTS[0].id);
  document.querySelector('input[name="visit"][value="初診"]').checked = true;
  showStep('dept');
}

// ==================== 初期化 ====================
window.addEventListener('DOMContentLoaded', () => {
  renderDepts();
});
</script>
</body>
</html>
