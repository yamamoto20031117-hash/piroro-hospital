<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピロロ病院</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #4a90e2 0%, #3fc28a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #2c3e50;
  }
  .card {
    background: #fff;
    border-radius: 18px;
    padding: 40px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 45px rgba(0,0,0,0.18);
    text-align: center;
  }
  .logo {
    width: 90px; height: 90px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4a90e2, #3fc28a);
    color: #fff;
    font-weight: 700;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 20px rgba(74,144,226,0.3);
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .tagline { color: #6b7b8c; font-size: 13px; margin-bottom: 26px; }
  .link-btn {
    display: block;
    padding: 16px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .link-btn:active { transform: scale(0.98); }
  .primary {
    background: #4a90e2;
    color: #fff;
  }
  .primary:hover { background: #3d7ec7; }
  .secondary {
    background: #fff;
    color: #4a90e2;
    border: 1.5px solid #4a90e2;
  }
  .secondary:hover { background: #f2f7fc; }
  .icon { font-size: 20px; margin-right: 6px; }
  .footer {
    margin-top: 18px;
    font-size: 11px;
    color: #9ab0c4;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">ピロロ</div>
    <h1>ピロロ病院</h1>
    <p class="tagline">スマホから簡単ご予約</p>

    <a href="./piroro_hospital_reservation.html" class="link-btn primary">
      <span class="icon">📱</span>診察を予約する
    </a>
    <a href="./piroro_hospital_admin.html" class="link-btn secondary">
      <span class="icon">🖥️</span>管理者ログイン
    </a>

    <div class="footer">
      〒100-0001 東京都千代田区丸の内1-1-1<br>
      TEL: 03-1234-5678<br>
      診療時間: 平日 9:00〜18:00 / 土 9:00〜13:00
    </div>
  </div>
</body>
</html>
